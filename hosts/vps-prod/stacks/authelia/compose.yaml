services:
  authelia:
    image: authelia/authelia:4.39.20@sha256:1b363e9279e742397966333f364e0876ae02bf5c876de73e83af6d48c57ff51b
    container_name: authelia
    restart: unless-stopped
    # .env rendu par pre_deploy (sops -d) déclaré dans komodo/stacks.toml.
    env_file: .env
    environment:
      # Active le templating de configuration.yaml (pour {{ secret "/data/oidc-issuer.pem" }}).
      X_AUTHELIA_CONFIG_FILTERS: template
    volumes:
      - ./configuration.yaml:/config/configuration.yml:ro
      - /data/authelia:/data
    networks:
      - frontend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      # --- Routeur du portail ---
      - "traefik.http.routers.authelia.rule=Host(`auth.vindiesel.vip`)"
      - "traefik.http.routers.authelia.entrypoints=websecure"
      - "traefik.http.routers.authelia.tls=true"
      - "traefik.http.services.authelia.loadbalancer.server.port=9091"
      # --- Middleware forward-auth réutilisable ---
      - "traefik.http.middlewares.authelia.forwardauth.address=http://authelia:9091/api/authz/forward-auth"
      - "traefik.http.middlewares.authelia.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.authelia.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email"

networks:
  frontend:
    name: frontend
    external: true
