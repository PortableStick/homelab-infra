services:
  whoami:
    image: traefik/whoami
    container_name: whoami-test
    restart: unless-stopped
    networks:
      - frontend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.whoami.rule=Host(`whoami.int.vindiesel.vip`)"
      - "traefik.http.routers.whoami.entrypoints=websecure"
      - "traefik.http.routers.whoami.tls=true"
      - "traefik.http.routers.whoami.middlewares=int-vpn"
      - "traefik.http.middlewares.int-vpn.ipallowlist.sourcerange=100.64.0.0/10"
      - "traefik.http.services.whoami.loadbalancer.server.port=80"

networks:
  frontend:
    name: frontend
    external: true
