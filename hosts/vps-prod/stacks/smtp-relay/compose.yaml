services:
  smtp-relay:
    image: boky/postfix:v5.1.0@sha256:aafc772384232497bed875e1eb66b4d3e54ba1ebc86e2e185a6dc1dbc48182ef
    container_name: smtp-relay
    restart: unless-stopped
    # .env rendu par pre_deploy (sops -d) déclaré dans komodo/stacks.toml.
    env_file: .env
    environment:
      # Smarthost Brevo.
      RELAYHOST: "[smtp-relay.brevo.com]:587"
      # Domaines autorisés comme expéditeur.
      ALLOWED_SENDER_DOMAINS: "vindiesel.vip lucasmasse.net outlook.com"
      # Nom d'hôte annoncé par Postfix.
      HOSTNAME: "mail.vindiesel.vip"
      # RELAYHOST_USERNAME / RELAYHOST_PASSWORD / TZ -> compose.env
    networks:
      - frontend

networks:
  frontend:
    name: frontend
    external: true
